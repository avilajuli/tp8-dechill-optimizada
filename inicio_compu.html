<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dechill - Indumentaria Personalizada</title>
  
  <link rel="stylesheet" href="Asset/css_iniciocopia.css">
  <link rel="stylesheet" href="https://cloudflare.com">
</head>
<body>

  <header class="main-header">
    <div class="header-container">
      
      
      <div class="logo-container">
        <img src="Asset/Recursos/logo_dechill.png" alt="Logo Dechill" class="logo">
      </div>

      
      <div class="search-bar">
        <input type="search" placeholder="¿Qué estás buscando?" class="search-input">
      </div>

      
      <ul class="user-menu">
        <li>
          <button class="action-btn">
            <img src="Asset/Recursos/usuario.png" alt="Usuario" width="20"> 
            <span>Usuario</span>
          </button>
        </li>
        <li>
          <button class="action-btn">
            <img src="Asset/Recursos/carrito.png" alt="Carrito" width="20"> 
            <span>Carrito</span>
          </button>
        </li>
      </ul>

    </div>

    
    <nav class="main-nav">
      <ul class="nav-menu">
        <li><button class="nav-link">INICIO</button></li>
        <li><button class="nav-link">PRODUCTOS</button></li>
        <li><button class="nav-link">PEDIDOS</button></li>
        <li><button class="nav-link">MAYORISTA</button></li>
        <li><button class="nav-link">CONTACTO</button></li>
      </ul>
    </nav>
  </header>
  
  
  <main class="hero-section">
    <div class="hero-content">
      <h1 class="hero-title">Indumentaria personalizada para vos o tu marca</h1>
      <div class="cta-container">
        <a href="#shop" class="cta-button">Ver productos</a>
      </div>
    </div>

    
    <div class="featured-image-container">
      <img src="Asset/Recursos/imagen_de_presentacion.png" alt="Presentación de marca" class="responsive-hero-img">
    </div> 
  </main>

  
  <footer class="social-footer">
    <div class="social-links">
      <a href="#" class="social-item">
        <i class="fa-brands fa-whatsapp"></i>
        <span>WhatsApp</span>
      </a>
      <a href="https://instagram.com" target="_blank" class="social-item">
      <i class="fa-brands fa-instagram"></i>
      <span>Seguinos en @dechill.stamp</span>
    </a>
      </a>
    </div>
  </footer>
<script src="Asset/javaultimo.js" > </script>
</body>
</html>
